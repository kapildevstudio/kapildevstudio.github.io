<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Page not found on Kapil Dev Studio."/>
<meta name="theme-color" content="#08080d"/>
<meta property="og:title" content="404 | Kapil Dev Studio"/>
<meta property="og:description" content="The page you are looking for could not be found."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://kapildevstudio.github.io/404.html"/>
<meta property="og:image" content="https://kapildevstudio.github.io/profile.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="canonical" href="https://kapildevstudio.github.io/404.html"/>
<link rel="icon" type="image/png" href="profile.png"/>
<title>404 | Kapil Dev Studio</title>
<style>
  :root {
    --bg: #08080d;
    --panel: rgba(14, 16, 26, 0.86);
    --text: #f2f0fa;
    --muted: #a8a4bd;
    --line: rgba(138, 129, 255, 0.14);
    --purple: #857bff;
    --teal: #12c79a;
    --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(133, 123, 255, 0.16), transparent 28%),
      radial-gradient(circle at 82% 24%, rgba(18, 199, 154, 0.14), transparent 26%),
      linear-gradient(180deg, #0a0a11 0%, #07080c 100%);
    padding: 20px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 256px 256px;
    opacity: 0.35;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: min(720px, 100%);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 30px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    padding: 34px 30px;
    text-align: center;
  }

  img {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 1px solid rgba(133, 123, 255, 0.35);
    margin-bottom: 18px;
  }

  .eyebrow {
    color: var(--teal);
    font-size: 0.82rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(2rem, 7vw, 4.5rem);
    line-height: 0.95;
    margin-bottom: 12px;
  }

  p {
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 22px;
  }

  .actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .button,
  .button-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
  }

  .button {
    background: linear-gradient(135deg, var(--teal), #34e6b7);
    color: #06110d;
  }

  .button-secondary {
    color: var(--text);
    border: 1px solid rgba(133, 123, 255, 0.32);
    background: rgba(133, 123, 255, 0.08);
  }
</style>
</head>
<body>
  <main class="card">
    <img src="profile.png" alt="Kapil Dev Studio game profile"/>
    <div class="eyebrow">404</div>
    <h1>Page not found.</h1>
    <p>
      The page you were looking for does not exist or may have moved. You can head back to the main Kapil Dev Studio site or open the contact page.
    </p>
    <div class="actions">
      <a class="button" href="index.html">Go to Homepage</a>
      <a class="button-secondary" href="contact.html">Contact</a>
    </div>
  </main>
</body>
</html>
